<template>
  <div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-semibold mb-6">Projects</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <template for:each={projects} for:item="pr">
        <div key={pr.id} class="p-4 border rounded">
          <div class="flex gap-4">
            <img class="w-36 h-24 object-cover rounded" src={pr.imageUrl} alt={pr.name} />
            <div class="flex-1">
              <h3 class="font-semibold">{pr.name}</h3>
              <p class="text-sm text-gray-500">{pr.description}</p>
              <div class="mt-3">
                <button class="px-3 py-1 bg-indigo-600 text-white rounded" data-id={pr.id} onclick={openProject}>Open</button>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</template>
