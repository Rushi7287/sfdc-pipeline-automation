# manual_run_with_test_class Workflow :

name: Manual Run With Test Class

on:
  workflow_dispatch:
    inputs:
      test_classes:
        description: 'Test classes to run'
        required: true
        default: 'null'
          
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Salesforce CLI
        shell: bash
        run: |
          npm install -g @salesforce/cli
          sf --version
      - name: Login to Environment
        shell: bash
        run: |
          sf org login sfdx-url --set-default --sfdx-url-file <(echo "${{ secrets.SFDX_INTEGRATION_URL }}")
      - name: Deploy to Environment
        shell: bash
        env:
          TEST_CLASSES: ${{ github.event.inputs.test_classes }}
        run: |
          sf project deploy start --manifest ./manifest/package.xml --wait 10 --test-level RunSpecifiedTests --tests  "$TEST_CLASSES"