# auto_run_without_test_class Workflow :

name: Auto Run Without Test Class

on:
  push:
    branches: 
      - main
    paths:
      - 'force-app/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Salesforce CLI
        shell: bash
        run: |
          npm install -g @salesforce/cli
          sf --version
      - name: Login to Environment
        shell: bash
        run: |
          sf org login sfdx-url --set-default --sfdx-url-file <(echo "${{ secrets.SFDX_INTEGRATION_URL }}")
      - name: Deploy to Environment
        shell: bash
        run: |
          sf project deploy start --manifest ./manifest/package.xml --wait 10 --test-level NoTestRun